apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: demo-devops
resources:
  - namespace.yaml
  - service-account.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - pdb.yaml
  - network-policy.yaml
labels:
  - pairs:
      app.kubernetes.io/part-of: demo-devops-java
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
    includeTemplates: true
