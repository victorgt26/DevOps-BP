apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../base
patches:
  - target:
      kind: Ingress
      name: demo-devops-java
    patch: |-
      - op: replace
        path: /spec/ingressClassName
        value: traefik
      - op: remove
        path: /spec/rules/0/host
  - target:
      kind: NetworkPolicy
      name: demo-devops-java
    patch: |-
      - op: replace
        path: /spec/ingress/0/from/0/namespaceSelector/matchLabels/kubernetes.io~1metadata.name
        value: kube-system
